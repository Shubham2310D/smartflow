map:
  center_lat: 12.97
  center_lon: 77.59
  zoom_start: 12

paths:
  raw_csv: data/raw/events.csv
  clean_csv: data/processed/clean.csv
  features_csv: data/processed/features.csv
  model_ready_csv: data/processed/model_ready.csv
  hotspots_geojson: data/processed/hotspots.geojson
  severity_model: models/severity_classifier.pkl
  closure_model: models/closure_predictor.pkl
  duration_model: models/duration_predictor.pkl

hotspot:
  dbscan_eps_km: 0.2        # 200 m search radius (haversine; converted to radians in code)
  dbscan_min_samples: 5
  kde_bandwidth: 0.04
  moran_significance: 0.05
  cluster_buffer_km: 0.2    # radius of the rendered cluster circle

severity_scoring:
  # score thresholds: total >= high_threshold → High, >= medium_threshold → Medium
  high_threshold: 4
  medium_threshold: 2

duration:
  max_minutes: 10080       # 7 days — cap for stale open tickets

resource_rules:
  base_personnel:
    Low: 2
    Medium: 3
    High: 5
  # High-incident-load hours, DERIVED from the data, not assumed commuter rush.
  # The raw start_datetime carries a "+00" tag but its wall-clock already behaves
  # as Bengaluru local time (converting to IST empties the evening rush and
  # invents a 2 AM peak — see temporal_features). This feed is ~60% truck
  # breakdowns; incident volume peaks in the freight window (evening + pre-dawn),
  # NOT the 08-10/17-20 commuter rush. These are the hours whose hourly count
  # exceeds the daily mean (~336/hr). Re-derive if the data changes.
  peak_hours: [0, 1, 2, 3, 4, 5, 6, 7, 19, 20, 21, 22, 23]
  peak_hour_bonus: 1
  road_closure_bonus: 1
  high_risk_cause_bonus: 1
  high_risk_causes:        # extra personnel for clearance OR crowd control
    - accident
    - flood
    - water_logging
    - protest
    - vip_movement
    - procession
  barricade_causes:
    - accident
    - tree_fall
    - flood
    - water_logging
    - protest
    - vip_movement
    - procession
    - public_event
  diversion_min_severity: High
  # model P(closure) ≥ this → barricade. DERIVED, not asserted: the cost-optimal
  # threshold on the holdout (a missed real closure weighted 5× a wasted barricade)
  # is 0.15 — see the precision/recall/cost curve on the Feedback Loop page and in
  # the closure model payload. The model's own stamped threshold overrides this
  # where the model is loaded (API, Predict→Resource Plan); this is the fallback.
  closure_prob_barricade_threshold: 0.15

# Officer roster for the multi-event allocation optimiser.
# ASSUMPTION: the dataset contains no staffing table or station capacity, so
# these are illustrative figures that give the allocator a supply side to
# optimise over. Tune them (or per-station overrides) to explore under-resourcing.
roster:
  default_officers_per_station: 6
  stations: {}   # e.g. {Cubbon Park: 10, Madiwala: 4} to override individual stations

# External data feeds (see src/external_feeds.py). These are the roadmap joins
# that would close the two structural gaps: a measured-impact ground truth (speed)
# and true advance forecasting for planned events (calendar). Both are OPTIONAL
# and OFF by default — the system runs fully without them; wiring one in is a
# drop-in upgrade, not a rewrite.
external:
  speed:
    provider: none           # none | tomtom | here  (needs an API key below)
    api_key: ""              # supply your key, or set env SMARTFLOW_SPEED_API_KEY
  event_calendar:
    # CSV of known upcoming planned events (stadium fixtures, permits, rallies).
    # Populate data/external/event_calendar.csv from the template the module writes.
    path: data/external/event_calendar.csv

# Officer push alerts (see src/notifications.py). Telegram, opt-in, OFF by default.
# SECURITY: do NOT paste your bot token here — config.yaml is committed. Set the
# credentials as ENVIRONMENT VARIABLES instead (TELEGRAM_BOT_TOKEN /
# TELEGRAM_CHAT_ID), e.g. on Render → Environment. These keys are read only as a
# local-dev fallback and must stay blank in the repo.
notifications:
  telegram_bot_token: ""
  telegram_chat_id: ""
